services:
  gate:
    build:
      context: ..
      dockerfile: ./Dockerfile
    env_file:
      - gate.env
    restart: unless-stopped
    volumes:
      - ./gate/config.yml:/config.yml
      - ./gate/:/run/
    ports:
      - '25565:25565' # Java Edition
      - '25565:25565/udp' # Java Edition query
      - '19132:19132/udp' # Geyser listener
      - '8080:8080' # API
    networks:
      - minecraft

networks:
  minecraft:
